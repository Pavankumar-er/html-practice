<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video</title>
  </head>
  <body>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%; /* Ensures the page itself takes full height */
        background-color: #000; /* Dark background like a real video app */
        overflow: hidden; /* Prevents accidental scrolling */
      }

      .video-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* 100% of the Viewport Height */
        width: 100vw; /* 100% of the Viewport Width */
      }

      .reel-video {
        height: 100%; /* Fills the container height */
        width: auto; /* Keeps the width proportional */
        max-width: 100%; /* Ensures it doesn't spill off the sides */
        object-fit: cover; /* Optional: Crops slightly to fill the screen edges */
      }
    </style>

    <div class="video-container">
      <video class="reel-video" controls loop muted autoplay playsinline>
        <source
          src="WhatsApp Video 2026-04-07 at 6.16.57 PM.mp4"
          type="video/mp4"
        />
        Your browser does not support this video
      </video>
    </div>
  </body>
</html>
