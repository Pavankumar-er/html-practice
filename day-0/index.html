<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video</title>
  </head>
  <body>
    <style>
      /* 1. Reset the browser defaults */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 2. Force the background to be full screen */
      body,
      html {
        height: 100%;
        background-color: #000; /* Black background like Reels */
        overflow: hidden; /* Stops the page from bouncing/scrolling */
      }

      /* 3. The magic container */
      .video-wrapper {
        width: 100vw; /* Full width of the phone */
        height: 100vh; /* Full height of the phone */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .reel-video {
        width: 100%; /* Fill the width */
        height: 100%; /* Fill the height */
        object-fit: contain; /* Use 'contain' so controls aren't cut off */
      }
    </style>

    <div class="video-wrapper">
      <video class="reel-video" controls loop playsinline>
        <source
          src="WhatsApp Video 2026-04-07 at 6.16.57 PM.mp4"
          type="video/mp4"
        />
        Your browser does not support this video
      </video>
    </div>
  </body>
</html>
